# ISMS / ISMS-P 2.10.3 CSRF (사이트 간 요청 위조)
# 관련 조항: 2.10 시스템 및 서비스 보안관리 - 2.10.3 공개서버 보안
id: 2.10.3-csrf
title: CSRF (사이트 간 요청 위조) 방어 미적용
description: |
  웹 애플리케이션에서 CSRF 토큰 없이 상태 변경 요청(POST/PUT/DELETE)을 처리하는 경우 탐지.
  CSRF 취약점을 이용하면 공격자가 인증된 사용자 권한으로 의도치 않은 요청을 서버에 전송할 수 있습니다.
  개인정보 변경, 송금, 관리자 기능 등에서 특히 위험합니다.
category: "2.10 시스템 및 서비스 보안관리"
subcategory: "2.10.3 공개서버 보안"

applicable_to:
  - isms
  - isms-p

severity: high

languages:
  - python
  - java
  - javascript

# Semgrep 규칙 ID 매핑
semgrep_rule_ids:
  - "python.flask.security.audit.wtf-csrf-disabled"
  - "python.django.security.audit.csrf-exempt"
  - "java.spring.security.audit.spring-csrf-disabled"
  - "javascript.express.security.audit.csurf-disabled"

# Bandit 테스트 ID 매핑
bandit_test_ids: []

# 취약한 패턴 예시
vulnerable_patterns:
  python:
    - "@csrf_exempt"
    - "WTF_CSRF_ENABLED = False"
    - "app.config['WTF_CSRF_ENABLED'] = False"
    - "@app.route('/transfer', methods=['POST'])  # CSRF 보호 없음"
    - "csrf = CSRFProtect(app); csrf.exempt(api_blueprint)"
  java:
    - "http.csrf().disable()"
    - ".csrf(AbstractHttpConfigurer::disable)"
    - "@CrossOrigin(origins = \"*\")  // 모든 오리진 허용"
  javascript:
    - "app.use(cors())  // 모든 오리진 허용, CSRF 검증 없음"
    - "// CSRF 미들웨어 없음"

# 안전한 코드 예시
safe_patterns:
  python:
    - "from flask_wtf.csrf import CSRFProtect; csrf = CSRFProtect(app)"
    - "WTF_CSRF_ENABLED = True  # 기본값"
    - "{{ form.csrf_token() }}  # Jinja2 템플릿에 CSRF 토큰 삽입"
  java:
    - "http.csrf(csrf -> csrf.csrfTokenRepository(CookieCsrfTokenRepository.withHttpOnlyFalse()))"
    - "@CsrfToken CsrfToken csrfToken  // 컨트롤러에서 CSRF 토큰 활용"
  javascript:
    - "const csrf = require('csurf'); app.use(csrf());"
    - "app.use(cors({ origin: 'https://trusted-domain.com' }));"

# 수정 권장사항
remediation:
  ko: |
    모든 상태 변경 요청에 CSRF 보호를 적용하세요:

    1. Flask:
       from flask_wtf.csrf import CSRFProtect
       csrf = CSRFProtect(app)
       # HTML 폼에 {{ form.hidden_tag() }} 또는 {{ form.csrf_token() }} 추가

    2. Django:
       MIDDLEWARE에 'django.middleware.csrf.CsrfViewMiddleware' 추가
       템플릿에 {% csrf_token %} 추가

    3. Spring Security:
       http.csrf(csrf -> csrf
           .csrfTokenRepository(CookieCsrfTokenRepository.withHttpOnlyFalse())
       )

    4. Express.js:
       const csrf = require('csurf');
       app.use(csrf({ cookie: true }));

    5. SameSite 쿠키 설정 (추가 방어):
       Set-Cookie: session=...; SameSite=Strict; Secure; HttpOnly

    ※ ISMS 2.10.3 "공개서버 보안" 참조
  en: |
    Apply CSRF protection to all state-changing requests:

    1. Use framework-provided CSRF middleware
    2. Include CSRF tokens in all HTML forms
    3. Validate CSRF tokens server-side
    4. Set SameSite cookie attribute

# 참조 자료
references:
  - https://www.kisa.or.kr/public/laws/laws3.jsp
  - https://owasp.org/www-community/attacks/csrf
  - https://cwe.mitre.org/data/definitions/352.html
  - https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/06-Session_Management_Testing/05-Testing_for_Cross_Site_Request_Forgery

# CWE/OWASP 매핑
cwe_ids:
  - "CWE-352"  # Cross-Site Request Forgery (CSRF)

owasp_ids:
  - "A01:2021"  # Broken Access Control
