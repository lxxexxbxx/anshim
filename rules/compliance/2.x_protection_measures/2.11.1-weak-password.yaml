# ISMS / ISMS-P 2.11.1 취약한 패스워드 정책
# 관련 조항: 2.11 사고 예방 및 대응 → 실제로는 2.5 인증 및 권한관리와 연계
# 코드 수준: 비밀번호 평문 저장, 취약한 해시 사용, 검증 로직 부재
id: 2.11.1-weak-password
title: 취약한 패스워드 저장 및 검증
description: |
  비밀번호를 평문으로 저장하거나, 취약한 해시 알고리즘(MD5, SHA1)으로 저장하거나,
  검증 로직 없이 사용자 입력을 직접 비교하는 경우 탐지.
  ISMS 인증 기준에 따라 비밀번호는 반드시 단방향 암호화(솔트+해시) 적용이 필요합니다.
category: "2.5 인증 및 권한관리"
subcategory: "2.5.1 사용자 계정 관리"

applicable_to:
  - isms
  - isms-p

severity: critical

languages:
  - python
  - java
  - javascript

# Semgrep 규칙 ID 매핑
semgrep_rule_ids:
  - "python.lang.security.audit.insecure-hash-algorithms.insecure-md5-hash"
  - "python.lang.security.audit.insecure-hash-algorithms.insecure-sha1-hash"
  - "python.lang.security.audit.hardcoded-password"
  - "java.lang.security.audit.crypto.weak-hash"
  - "javascript.lang.security.audit.weak-hash"

# Bandit 테스트 ID 매핑
bandit_test_ids:
  - "B303"  # Use of MD5, SHA1
  - "B324"  # hashlib.new insecure hash

# 취약한 패턴 예시
vulnerable_patterns:
  python:
    - "user.password = request.form['password']  # 평문 저장"
    - "hashlib.md5(password.encode()).hexdigest()  # MD5 사용"
    - "hashlib.sha1(password.encode()).hexdigest()  # SHA1 사용"
    - "if user.password == input_password:  # 평문 비교"
    - "password_hash = hashlib.sha256(password).hexdigest()  # 솔트 없음"
  java:
    - "user.setPassword(plainPassword);  // 평문 저장"
    - "MessageDigest.getInstance(\"MD5\")  // 취약한 해시"
    - "String hash = DigestUtils.md5Hex(password);"
    - "if (user.getPassword().equals(inputPassword))  // 평문 비교"
  javascript:
    - "user.password = req.body.password;  // 평문 저장"
    - "crypto.createHash('md5').update(password).digest('hex');"
    - "if (user.password === inputPassword)  // 평문 비교"

# 안전한 코드 예시
safe_patterns:
  python:
    - "import bcrypt"
    - "hashed = bcrypt.hashpw(password.encode(), bcrypt.gensalt())"
    - "bcrypt.checkpw(input_password.encode(), stored_hash)"
    - "from passlib.hash import argon2"
    - "argon2.hash(password)"
  java:
    - "BCryptPasswordEncoder encoder = new BCryptPasswordEncoder();"
    - "String hash = encoder.encode(rawPassword);"
    - "encoder.matches(rawPassword, storedHash)"
  javascript:
    - "const bcrypt = require('bcrypt');"
    - "const hash = await bcrypt.hash(password, 12);"
    - "await bcrypt.compare(input, storedHash)"

# 수정 권장사항
remediation:
  ko: |
    비밀번호는 반드시 안전한 방식으로 저장하고 검증하세요:

    1. 단방향 해시 + 솔트 (필수):
       - Python: bcrypt, argon2-cffi, passlib 라이브러리 사용
         pip install bcrypt
         hash = bcrypt.hashpw(password.encode(), bcrypt.gensalt(rounds=12))

       - Java: Spring Security BCryptPasswordEncoder 사용
         BCryptPasswordEncoder encoder = new BCryptPasswordEncoder(12);
         String hash = encoder.encode(rawPassword);

       - Node.js: bcrypt 패키지 사용
         const hash = await bcrypt.hash(password, 12);

    2. 절대 사용 금지:
       - 평문 저장 (직접 DB 저장)
       - MD5, SHA1 (보안 취약)
       - SHA256 단독 (솔트 없이)

    3. 추천 알고리즘 (보안 강도 순):
       Argon2id > bcrypt (cost≥12) > scrypt

    ※ ISMS 2.5.1 "사용자 계정 관리", KISA 안전한 패스워드 관리 지침 참조
  en: |
    Always store passwords with proper one-way hashing + salt:

    1. Use bcrypt, argon2, or scrypt (never MD5/SHA1)
    2. Use minimum cost factor of 12 for bcrypt
    3. Never store plaintext passwords
    4. Never compare passwords as plaintext strings

# 참조 자료
references:
  - https://www.kisa.or.kr/public/laws/laws3.jsp
  - https://cheatsheetseries.owasp.org/cheatsheets/Password_Storage_Cheat_Sheet.html
  - https://cwe.mitre.org/data/definitions/256.html
  - https://cwe.mitre.org/data/definitions/916.html

# CWE/OWASP 매핑
cwe_ids:
  - "CWE-256"  # Unprotected Storage of Credentials
  - "CWE-916"  # Use of Password Hash With Insufficient Computational Effort
  - "CWE-312"  # Cleartext Storage of Sensitive Information
  - "CWE-261"  # Weak Encoding for Password

owasp_ids:
  - "A02:2021"  # Cryptographic Failures
  - "A07:2021"  # Identification and Authentication Failures
