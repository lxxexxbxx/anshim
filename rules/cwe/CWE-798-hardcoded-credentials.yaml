# CWE-798: Use of Hard-coded Credentials
id: CWE-798-hardcoded-credentials
title: 하드코딩된 자격증명 (Hard-coded Credentials)
description: |
  비밀번호, API 키, 암호화 키 등 민감한 자격증명이 소스 코드에 직접 포함된 취약점.
  소스 코드 유출 시 시스템 전체가 위험해지며, 버전 관리 히스토리에 영구적으로 남습니다.
category: "CWE Top 25"
subcategory: "CWE-798 Hard-coded Credentials"

applicable_to:
  - cwe
  - owasp
  - isms
  - isms-p

severity: critical

languages:
  - python
  - java
  - javascript

semgrep_rule_ids:
  - "python.lang.security.audit.hardcoded-password"
  - "python.django.security.audit.hardcoded-secret-key"
  - "python.flask.security.audit.hardcoded-secret-key"
  - "java.lang.security.audit.hardcoded-credentials"
  - "java.lang.security.audit.hardcoded-password"
  - "javascript.lang.security.audit.hardcoded-secret"
  - "generic.secrets.security.detected-private-key"

bandit_test_ids:
  - "B105"  # hardcoded_password_string
  - "B106"  # hardcoded_password_funcarg
  - "B107"  # hardcoded_password_default

vulnerable_patterns:
  python:
    - "password = \"admin123\""
    - "API_KEY = \"sk-1234567890abcdef\""
    - "SECRET_KEY = \"mysupersecretkey\""
    - "connect(host, user, password=\"dbpass\")"
  java:
    - "private String password = \"admin123\";"
    - "final String API_KEY = \"key123\";"
    - "connection = DriverManager.getConnection(url, \"user\", \"pass\");"
  javascript:
    - "const apiKey = 'sk-1234567890';"
    - "const password = 'admin123';"
    - "jwt.sign(payload, 'secretkey');"

remediation:
  ko: |
    하드코딩된 자격증명을 방지하려면:

    1. 환경 변수 사용:
       - Python: os.environ.get('API_KEY')
       - Java: System.getenv("API_KEY")
       - JavaScript: process.env.API_KEY

    2. 설정 파일 분리 (.env, config.yaml):
       - .gitignore에 추가하여 버전 관리 제외

    3. 보안 저장소 사용:
       - AWS Secrets Manager
       - HashiCorp Vault
       - Azure Key Vault

    4. 기존 하드코딩된 자격증명 처리:
       - 즉시 해당 키/비밀번호 폐기 및 교체
       - git 히스토리에서 제거 (git filter-branch 또는 BFG Repo-Cleaner)

    5. 코드 리뷰 및 CI/CD에서 시크릿 스캐닝 도구 사용
  en: |
    To prevent hard-coded credentials:

    1. Use environment variables
    2. Separate config files (excluded from version control)
    3. Use secret management solutions (Vault, AWS Secrets Manager)
    4. Revoke and rotate any exposed credentials
    5. Use secret scanning tools in code review and CI/CD

references:
  - https://cwe.mitre.org/data/definitions/798.html
  - https://owasp.org/www-community/vulnerabilities/Use_of_hard-coded_password
  - https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html

cwe_ids:
  - "CWE-798"
  - "CWE-259"  # Use of Hard-coded Password

owasp_ids:
  - "A07:2021"
